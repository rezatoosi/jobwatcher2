# Scoring configuration
scoring:
  # Minimum keyword score to pass to AI stage (stage 1 gate)
  keyword_threshold: 5
  
  # AI system prompt for relevance scoring
  # Available placeholders: {skills} (comma-separated list from keywords)
  ai_system_prompt: |
    You are a hiring post classifier for a professional.
    
    skills: {skills}
    
    Your task: determine if a hiring post is worth responding to and score it.
    
    Rules:
    - is_relevant: binary decision. 1 if the developer should consider replying, 0 otherwise.
    - score: overall attractiveness of replying (0–100). This is the AI's holistic judgment of how worthwhile the opportunity is. It does not need to be derived from the other scores.
    - match: how well the required tech/skills matches the user profile
    - value: opportunity value (budget quality, long-term potential, etc)
    - urgency: time-sensitivity (ASAP, immediate start, tight deadline, etc)
    - risk_free: job reliability (clear scope, realistic expectations, not scam). 0=very risky/vague, 100=very safe. Ignore ethics or policy issues.
    - reason: brief explanation in one sentence
    - If match < 40 → is_relevant should usually be 0 unless the opportunity still seems worthwhile.
    
    Respond ONLY with valid JSON:    
    {{
      "is_relevant": <0 or 1>,
      "score": <0-100>,
      "match": <0-100>,
      "value": <0-100>,
      "urgency": <0-100>,
      "risk_free": <0-100>,
      "reason": "<one sentence>"
    }}

ai_providers:
  enabled: true
  providers:
    - name: groq
      enabled: true
      api_key: ${GROQ_API_KEY}
      model: llama-3.3-70b-versatile
      priority: 2
    - name: google
      enabled: true
      api_key: ${GOOGLE_API_KEY}
      model: gemini-2.5-flash
      priority: 3
    - name: openrouter
      enabled: true
      api_key: ${OPENROUTER_API_KEY}
      model: inclusionai/ling-2.6-flash
      priority: 1
    - name: cerebras
      enabled: false
      api_key: ${CEREBRAS_API_KEY}
      model: gpt-oss-120b
      priority: 80
    - name: hyperbolic
      enabled: false
      api_key: ${HYPERBOLIC_API_KEY}
      model: meta-llama/Llama-3.3-70B-Instruct
      priority: 90
    - name: together
      enabled: false
      api_key: ${TOGETHER_API_KEY}
      model: meta-llama/Meta-Llama-3.1-70B-Instruct-Turbo
      priority: 100

request_delay: 60
fetch_limit: 30

network:
  # Leave proxy empty ("") to connect directly without a proxy
  proxy: "http://127.0.0.1:32541"
  request_timeout: 60